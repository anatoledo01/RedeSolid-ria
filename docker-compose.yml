version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rede-solidaria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rede_solidaria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rede_solidaria_2024}
      POSTGRES_DB: ${DB_NAME:-rede_solidaria}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-rede_solidaria}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
